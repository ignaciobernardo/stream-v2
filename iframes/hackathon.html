<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #191919;
      border: 2.5px solid #07FF00;
      border-radius: 20px;
      padding: 0.22em 0.55em;
      white-space: nowrap;
      font-size: 80px;
    }

    .time {
      font-family: 'GT America', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 1em;
      line-height: 1;
      color: #07FF00;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="time" id="time">--:--:--</span>
  </div>

  <script>
    // Hackathon ends at 02:30 AM Venezuela (UTC-4) → 06:30 UTC on 2026-05-14
    const DEADLINE = new Date("2026-05-14T06:30:00.000Z").getTime();

    const el = document.getElementById("time");

    function format(ms) {
      if (ms <= 0) return "00:00:00";
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
    }

    function tick() {
      el.textContent = format(DEADLINE - Date.now());
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
